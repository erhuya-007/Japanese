<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语练习 · 五十音 & 基础用语</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-muted: #6b7280;
      --accent: #3b6fd9;
      --accent-soft: #eef3fc;
      --success: #16a34a;
      --success-soft: #ecfdf3;
      --error: #dc2626;
      --error-soft: #fef2f2;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      --radius: 10px;
      --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 700;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .logo p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stats-bar span strong {
      color: var(--text);
      font-weight: 600;
    }

    nav.tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      padding: 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    nav.tabs button {
      flex: 1;
      min-width: 100px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }

    nav.tabs button:hover { color: var(--text); background: var(--bg); }
    nav.tabs button.active {
      background: var(--accent);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    .controls label {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    select, .chip-group {
      font-family: inherit;
    }

    select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      background: var(--surface);
      cursor: pointer;
      transition: all .12s;
    }

    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }

    /* Quiz area */
    .quiz-area {
      text-align: center;
      padding: 32px 16px 24px;
    }

    .quiz-prompt {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .quiz-display {
      font-size: 72px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 8px;
      min-height: 86px;
      font-family: "Yu Gothic UI", "Meiryo", "Hiragino Sans", sans-serif;
    }

    .quiz-display.small { font-size: 28px; min-height: auto; margin-bottom: 16px; }

    .quiz-hint {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      min-height: 22px;
    }

    .answer-row {
      display: flex;
      gap: 8px;
      max-width: 360px;
      margin: 0 auto 12px;
    }

    .answer-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border-color .15s;
    }

    .answer-row input:focus { border-color: var(--accent); }
    .answer-row input.correct { border-color: var(--success); background: var(--success-soft); }
    .answer-row input.wrong { border-color: var(--error); background: var(--error-soft); }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.08); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--bg); color: var(--text); }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .feedback {
      margin-top: 12px;
      font-size: 14px;
      min-height: 22px;
    }

    .feedback.ok { color: var(--success); }
    .feedback.err { color: var(--error); }

    .progress-line {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-line div {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .3s;
    }

    .session-score {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
    }

    /* Kana chart */
    .kana-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .kana-cell {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 4px;
      text-align: center;
      cursor: pointer;
      transition: all .12s;
      background: var(--surface);
    }

    .kana-cell:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .kana-cell .kana {
      font-size: 22px;
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
    }

    .kana-cell .romaji {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .kana-cell.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    /* Phrases */
    .phrase-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .phrase-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
    }

    .phrase-item:hover { background: var(--bg); }

    .phrase-jp {
      font-size: 18px;
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
    }

    .phrase-romaji {
      font-size: 12px;
      color: var(--accent);
      margin-top: 2px;
    }

    .phrase-cn {
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
    }

    .phrase-item.revealed .phrase-cn { color: var(--text); font-weight: 500; }

    .phrase-quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 480px;
      margin: 0 auto;
    }

    .phrase-quiz-options button {
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 14px;
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
    }

    .phrase-quiz-options button:hover:not(:disabled) {
      border-color: var(--accent);
    }

    .phrase-quiz-options button.correct {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .phrase-quiz-options button.wrong {
      border-color: var(--error);
      background: var(--error-soft);
    }

    .shortcuts {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
    }

    kbd {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      font-size: 11px;
      font-family: inherit;
    }

    @media (max-width: 600px) {
      .quiz-display { font-size: 52px; }
      .kana-grid { grid-template-columns: repeat(3, 1fr); }
      .phrase-quiz-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="logo-icon">あ</div>
        <div>
          <h1>日语练习</h1>
          <p>五十音 · 基础用语 · 随时练</p>
        </div>
      </div>
      <div class="stats-bar">
        <span>今日练习 <strong id="todayCount">0</strong> 题</span>
        <span>连续 <strong id="streak">0</strong> 天</span>
        <span>正确率 <strong id="accuracy">—</strong></span>
      </div>
    </header>

    <nav class="tabs">
      <button class="active" data-tab="kana-quiz">五十音测验</button>
      <button data-tab="kana-chart">五十音表</button>
      <button data-tab="phrase-quiz">用语测验</button>
      <button data-tab="phrase-list">用语速查</button>
    </nav>

    <!-- 五十音测验 -->
    <section id="kana-quiz" class="panel active">
      <div class="card">
        <div class="controls">
          <label>假名类型</label>
          <div class="chip-group" id="kanaTypeChips">
            <button class="chip active" data-type="hiragana">平假名</button>
            <button class="chip" data-type="katakana">片假名</button>
          </div>
          <label style="margin-left:8px">方向</label>
          <select id="kanaDirection">
            <option value="to-kana">看罗马音 → 输入假名</option>
            <option value="to-romaji">看假名 → 输入罗马音</option>
          </select>
          <label style="margin-left:8px">范围</label>
          <select id="kanaScope">
            <option value="all">全部 46 音</option>
            <option value="gojuon">清音（あ～わ行）</option>
            <option value="dakuon">浊音・半浊音</option>
            <option value="yoon">拗音</option>
          </select>
        </div>
        <div class="progress-line"><div id="kanaProgress" style="width:0%"></div></div>
        <div class="session-score" id="kanaSessionScore">本轮 0 / 0</div>
        <div class="quiz-area">
          <div class="quiz-prompt" id="kanaPrompt">请输入对应的平假名</div>
          <div class="quiz-display" id="kanaDisplay">あ</div>
          <div class="quiz-hint" id="kanaHint"></div>
          <div class="answer-row">
            <input type="text" id="kanaInput" placeholder="输入答案..." autocomplete="off" spellcheck="false">
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="kanaSubmit">确认 Enter</button>
            <button class="btn btn-ghost" id="kanaSkip">跳过 →</button>
            <button class="btn btn-ghost" id="kanaHintBtn">提示</button>
          </div>
          <div class="feedback" id="kanaFeedback"></div>
        </div>
        <div class="shortcuts">
          <kbd>Enter</kbd> 确认 &nbsp; <kbd>→</kbd> 跳过 &nbsp; <kbd>H</kbd> 提示
        </div>
      </div>
    </section>

    <!-- 五十音表 -->
    <section id="kana-chart" class="panel">
      <div class="card">
        <div class="controls">
          <div class="chip-group" id="chartTypeChips">
            <button class="chip active" data-type="hiragana">平假名</button>
            <button class="chip" data-type="katakana">片假名</button>
          </div>
          <button class="btn btn-ghost" id="chartSpeak" style="margin-left:auto;font-size:12px">🔊 点击发音</button>
        </div>
        <div class="kana-grid" id="kanaGrid"></div>
      </div>
    </section>

    <!-- 用语测验 -->
    <section id="phrase-quiz" class="panel">
      <div class="card">
        <div class="controls">
          <label>模式</label>
          <select id="phraseMode">
            <option value="jp-to-cn">看日语 → 选中文意思</option>
            <option value="cn-to-jp">看中文 → 选日语</option>
          </select>
          <label style="margin-left:8px">分类</label>
          <select id="phraseCategory">
            <option value="all">全部</option>
            <option value="greeting">问候</option>
            <option value="daily">日常</option>
            <option value="polite">礼貌用语</option>
            <option value="number">数字</option>
          </select>
        </div>
        <div class="progress-line"><div id="phraseProgress" style="width:0%"></div></div>
        <div class="session-score" id="phraseSessionScore">本轮 0 / 0</div>
        <div class="quiz-area">
          <div class="quiz-prompt" id="phrasePrompt">选择正确的中文意思</div>
          <div class="quiz-display small" id="phraseDisplay">おはようございます</div>
          <div class="quiz-hint" id="phraseHint"></div>
          <div class="phrase-quiz-options" id="phraseOptions"></div>
          <div class="btn-row" style="margin-top:16px">
            <button class="btn btn-ghost" id="phraseNext" disabled>下一题 →</button>
          </div>
          <div class="feedback" id="phraseFeedback"></div>
        </div>
      </div>
    </section>

    <!-- 用语速查 -->
    <section id="phrase-list" class="panel">
      <div class="card">
        <div class="controls">
          <label>分类</label>
          <select id="listCategory">
            <option value="all">全部</option>
            <option value="greeting">问候</option>
            <option value="daily">日常</option>
            <option value="polite">礼貌用语</option>
            <option value="number">数字</option>
          </select>
          <button class="btn btn-ghost" id="revealAll" style="margin-left:auto;font-size:12px">显示全部释义</button>
        </div>
        <div class="phrase-list" id="phraseListContainer"></div>
      </div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
